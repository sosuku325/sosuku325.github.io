    <title>ソスクのページ</title>
    <style>
        body {
            background-image: url('image/haikei.png');
            background-size: cover;
            background-position: center;
            margin: 0;
            height: 100vh;
            color: rgb(255, 255, 255); /* 文字色を白に設定 */
            display: flex;
            flex-direction: column;
            align-items: center; /* 横方向は中央 */
            justify-content: flex-start; /* 上に寄せる */
            padding-top: 20px; /* 上部に少し余白を追加 */
        }
        h1 {
            display: inline; /* h1をインラインにして横並びにする */
            margin-right: 10px; /* 右に少しスペースを追加 */
        }
        a {
            color: rgb(255, 255, 255); /* URLの文字色を白に設定 */
            text-decoration: none; /* 下線を消す */
        }
        a:hover {
            text-decoration: underline; /* ホバー時に下線を追加 */
        }
        p {
            margin: 20px 0; /* pタグに上下の余白を追加 */
        }
        .sosuke-mod, .famicom-dumper, .minipc, .ariekukito {
            font-size: 50px; /* 大きな文字に設定 */
            font-weight: bold; /* 太字に設定 */
            position: absolute; /* 左下に固定 */
            bottom: 570px; /* SosukeModを少し下に配置 */
            left: 20px;
        }
        .famicom-dumper {
            bottom: 500px; /* ファミコン吸いだし機をさらに下に配置 */
        }

        .minipc {
            bottom: 430px;
        }

        .ariekukito {
            bottom: 350px;
        }

    </style>
